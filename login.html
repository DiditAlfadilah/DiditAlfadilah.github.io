<!DOCTYPE html>
<html>
<head>
<title>Login AINVORIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    
/* ================= LOGIN PAGE ================= */

.login-page{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(
  135deg,
  #0f172a,
  #1e293b,
  #111827
  );

  font-family:'Poppins',sans-serif;
}

.login-box{

  width:400px;
  max-width:90%;

  background:#fff;

  padding:40px;

  border-radius:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.3);

  text-align:center;
}

.login-logo{

  width:90px;
  height:90px;

  object-fit:contain;

  margin-bottom:15px;
}

.login-box h1{

  color:#1e3c72;

  margin-bottom:10px;

  font-size:32px;
}

.login-box p{

  color:#666;

  margin-bottom:30px;
}

.login-box input{

  width:100%;

  padding:14px;

  margin-bottom:15px;

  border:1px solid #ddd;

  border-radius:12px;

  outline:none;

  font-size:15px;

  transition:.3s;
}

.login-box input:focus{

  border-color:#d4af37;

  box-shadow:
  0 0 10px rgba(212,175,55,.3);
}

.login-btn{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  background:linear-gradient(
  90deg,
  #1e3c72,
  #2a5298
  );

  color:white;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:.3s;
}

.login-btn:hover{

  background:linear-gradient(
  90deg,
  #d4af37,
  #f4d03f
  );

  color:#111;

  transform:translateY(-2px);
}

.login-footer{

  margin-top:20px;

  font-size:13px;

  color:#888;
}
</style>

</head>

<body class="login-page">

<div class="login-box">

  <img
  src="ainvoria.jpg"
  class="login-logo"
  alt="AINVORIA Logo">

  <h1>AINVORIA</h1>

  <p>Elegance In Every Choice</p>

  <input
  id="username"
  type="text"
  placeholder="Username">

  <input
  id="password"
  type="password"
  placeholder="Password"
  onkeypress="if(event.key==='Enter') login()">

  <button
  class="login-btn"
  onclick="login()">

  Login

  </button>

  <div class="login-footer">

    © 2026 AINVORIA

  </div>

</div>

<script>

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username==="gentayangan" &&
       password==="170721"){

        localStorage.setItem("login","true");

        window.location.href="index.html";

    }

    else{

        alert("Username atau Password Salah");

    }

}

</script>

</body>
</html>
