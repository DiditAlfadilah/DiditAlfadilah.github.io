<!DOCTYPE html>
<html>
<head>
<title>Login AINVORIA</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    font-family:Poppins,sans-serif;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#1e3c72;
    color:white;
    border:none;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Login AINVORIA</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username==="gentayangan" &&
       password==="170721"){

        localStorage.setItem("login","true");

        window.location.href="index.html";

    }

    else{

        alert("Username atau Password Salah");

    }

}

</script>

</body>
</html>
